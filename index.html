<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coder Aura</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1 {
      font-size: 2.5rem;
      color: #a78bfa;
      margin-bottom: 8px;
    }

    p.subtitle {
      color: #888;
      margin-bottom: 40px;
      font-size: 1rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 12px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus { border-color: #a78bfa; }

    button {
      width: 100%;
      padding: 12px;
      background: #a78bfa;
      color: #0f0f0f;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #c4b5fd; }
    button:disabled { background: #444; cursor: not-allowed; }

    .result {
      margin-top: 20px;
      padding: 16px;
      background: #111;
      border-radius: 10px;
      border: 1px solid #2e2e2e;
      font-size: 0.95rem;
      line-height: 1.6;
      display: none;
    }

    .result.show { display: block; }

    .status {
      margin-top: 12px;
      font-size: 0.85rem;
      text-align: center;
    }

    .status.ok { color: #4ade80; }
    .status.err { color: #f87171; }
    .status.loading { color: #facc15; }

    .label {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

  <h1>⚡ Coder Aura</h1>
  <p class="subtitle">Backend Connection Test</p>

  <div class="card">
    <div class="label">Backend URL daalo (tumhara Railway/Render URL)</div>
    <input type="text" id="apiUrl" placeholder="https://your-backend.railway.app/api/message" />

    <div class="label" style="margin-top:8px">Apna naam daalo</div>
    <input type="text" id="nameInput" placeholder="e.g. Rahul" />

    <button onclick="callBackend()" id="btn">Backend Ko Call Karo 🚀</button>

    <div class="result" id="result"></div>
    <div class="status" id="status"></div>
  </div>

  <script>
    async function callBackend() {
      const url = document.getElementById('apiUrl').value.trim();
      const name = document.getElementById('nameInput').value.trim();
      const btn = document.getElementById('btn');
      const result = document.getElementById('result');
      const status = document.getElementById('status');

      if (!url) {
        status.textContent = '⚠️ Pehle backend URL daalo!';
        status.className = 'status err';
        return;
      }

      btn.disabled = true;
      status.textContent = '⏳ Backend se baat ho rahi hai...';
      status.className = 'status loading';
      result.classList.remove('show');

      try {
        const finalUrl = name ? `${url}?name=${encodeURIComponent(name)}` : url;
        const res = await fetch(finalUrl);

        if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);

        const data = await res.json();

        result.innerHTML = `<strong>Response:</strong><br><pre>${JSON.stringify(data, null, 2)}</pre>`;
        result.classList.add('show');
        status.textContent = '✅ Backend connected successfully!';
        status.className = 'status ok';
      } catch (err) {
        result.innerHTML = `<strong>Error:</strong> ${err.message}`;
        result.classList.add('show');
        status.textContent = '❌ Backend se connection nahi hua';
        status.className = 'status err';
      } finally {
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
